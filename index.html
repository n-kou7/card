<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>カード神経衰弱</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff4c7}
body{
  font-family:"Hiragino Maru Gothic ProN","Arial",sans-serif;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
#wrap{
  width:100vw;
  height:100dvh;
  padding:2px 6px 3px;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
}
#top{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  font-size:clamp(24px,3.7vh,36px);
  font-weight:bold;
  line-height:1;
  margin:0;
  white-space:nowrap;
}
#message{
  min-width:300px;
  color:#e85b00;
  text-align:center;
}
#game{
  display:grid;
  justify-content:center;
  align-content:center;
  width:100%;
  flex:1;
  gap:var(--gap,4px);
  overflow:hidden;
}
#game.normal{
  grid-template-columns:repeat(6,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
#game.honki{
  grid-template-columns:repeat(8,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
.card{
  width:var(--cardW);
  height:var(--cardH);
  perspective:900px;
}
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .25s;
}
.card.open .inner,.card.done .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden}
.front{transform:rotateY(180deg)}
.face img{width:100%;height:100%;object-fit:contain;display:block}
.card.done{animation:pop .2s}
@keyframes pop{50%{transform:scale(1.06)}}
#buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:1px 0 0;
  flex-shrink:0;
}
button{
  font-size:clamp(22px,3.6vh,32px);
  line-height:1;
  padding:6px 30px;
  border:0;
  border-radius:16px;
  color:white;
  background:#ff8a3d;
  font-weight:bold;
}
#modeBtn{background:#d44}
#clear{
  display:none;
  position:fixed;
  inset:0;
  background:#fff4cfe8;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10;
}
#clear div{
  font-size:64px;
  font-weight:bold;
  margin-bottom:18px;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div id="remain"></div>
    <div id="message"></div>
  </div>

  <div id="game"></div>

  <div id="buttons">
    <button onclick="start(currentMode)">もう一回</button>
    <button id="modeBtn" onclick="toggleMode()">🔥本気</button>
  </div>
</div>

<div id="clear">
  <div>クリア！</div>
  <button onclick="start(currentMode)">もう一回</button>
</div>

<script>
const normal=[
  "card-02.png","card-03.png","card-04.png",
  "card-05.png","card-06.png","card-07.png",
  "card-08.png","card-09.png","card-10.png"
];
const honki=[...normal,"card-11.png","card-12.png","card-13.png"];

let currentMode="normal";
let imgs=normal;
let first=null;
let second=null;
let lock=false;
let clearCount=0;

// 音まわりシンプル版：最初にまとめて鳴らさない
function playFlip(){
  try{
    const a=new Audio("meku.mp3");
    a.play().catch(()=>{});
  }catch(e){}
}

function playOk(){
  setTimeout(()=>{
    try{
      const a=new Audio("sei.mp3");
      a.play().catch(()=>{});
    }catch(e){}
  },420);
}

function fitCards(){
  const cols=currentMode==="honki"?8:6;
  const rows=3;
  const wrap=document.getElementById("wrap");
  const top=document.getElementById("top");
  const buttons=document.getElementById("buttons");

  const gap=4;
  const screenW=window.innerWidth || wrap.clientWidth;
  const screenH=window.innerHeight || wrap.clientHeight;

  const usableW=screenW-18;
  const usableH=screenH-top.offsetHeight-buttons.offsetHeight-18;

  let cardH=((usableH-gap*(rows-1))/rows)*0.90;
  let cardW=cardH*2/3;

  const maxW=(usableW-gap*(cols-1))/cols;
  if(cardW>maxW){
    cardW=maxW;
    cardH=cardW*3/2;
  }

  const maxH=((usableH-gap*(rows-1))/rows)*0.92;
  if(cardH>maxH){
    cardH=maxH;
    cardW=cardH*2/3;
  }

  document.documentElement.style.setProperty("--cardW",Math.floor(cardW)+"px");
  document.documentElement.style.setProperty("--cardH",Math.floor(cardH)+"px");
  document.documentElement.style.setProperty("--gap",gap+"px");
}

window.addEventListener("resize",fitCards);
window.addEventListener("orientationchange",()=>setTimeout(fitCards,300));

function toggleMode(){
  start(currentMode==="normal"?"honki":"normal");
}

function start(mode="normal"){
  currentMode=mode;
  imgs=mode==="honki"?honki:normal;

  modeBtn.textContent=mode==="normal"?"🔥本気":"😊通常";
  message.textContent=mode==="normal"?"同じカードを見つけよう！":"本気モード！";

  game.className=mode;
  game.innerHTML="";
  clearCount=0;
  first=null;
  second=null;
  lock=false;

  document.getElementById("clear").style.display="none";
  updateInfo();

  const cards=[...imgs,...imgs].sort(()=>Math.random()-.5);

  cards.forEach(im=>{
    const card=document.createElement("div");
    card.className="card";
    card.dataset.i=im;
    card.innerHTML=
      `<div class="inner">
        <div class="face"><img src="card-01.png"></div>
        <div class="face front"><img src="${im}"></div>
      </div>`;
    card.onclick=()=>openCard(card);
    game.appendChild(card);
  });

  requestAnimationFrame(fitCards);
}

function openCard(card){
  if(lock||card.classList.contains("open")||card.classList.contains("done"))return;

  playFlip();
  card.classList.add("open");

  if(!first){
    first=card;
    return;
  }

  second=card;
  lock=true;

  if(first.dataset.i===second.dataset.i){
    playOk();

    first.classList.add("done");
    second.classList.add("done");

    clearCount++;
    first=null;
    second=null;
    lock=false;
    message.textContent="あたり！";
    updateInfo();

    if(clearCount===imgs.length){
      setTimeout(()=>{
        document.getElementById("clear").style.display="flex";
      },300);
    }
  }else{
    message.textContent="ちがうよ！";

    setTimeout(()=>{
      first.classList.remove("open");
      second.classList.remove("open");
      first=null;
      second=null;
      lock=false;
      message.textContent=currentMode==="normal"?"同じカードを見つけよう！":"本気モード！";
    },700);
  }
}

function updateInfo(){
  remain.textContent="のこり"+(imgs.length-clearCount)+"組";
}

start("normal");
</script>
</body>
</html>
