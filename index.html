<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>カード神経衰弱</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#fff4c7;
}
body{
  font-family:"Hiragino Maru Gothic ProN","Arial",sans-serif;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
#wrap{
  width:100vw;
  height:100vh;
  height:100dvh;
  padding:3px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
#top{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:22px;
  font-size:clamp(24px,3.8vh,38px);
  font-weight:bold;
  line-height:1;
  white-space:nowrap;
  margin:0 0 3px;
}
#remain{color:#222}
#message{
  min-width:300px;
  text-align:center;
  color:#e85b00;
}
#game{
  width:100%;
  flex:1;
  display:grid;
  justify-content:center;
  align-content:center;
  gap:var(--gap,4px);
  overflow:hidden;
}
#game.normal{
  grid-template-columns:repeat(6,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
#game.honki{
  grid-template-columns:repeat(8,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
.card{
  width:var(--cardW);
  height:var(--cardH);
  perspective:900px;
}
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .25s ease;
}
.card.open .inner,
.card.done .inner{
  transform:rotateY(180deg);
}
.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
.front{transform:rotateY(180deg)}
.face img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  pointer-events:none;
}
.card.done{animation:pop .18s ease}
@keyframes pop{50%{transform:scale(1.05)}}
#buttons{
  flex-shrink:0;
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:3px;
}
button{
  border:0;
  border-radius:16px;
  padding:6px 30px;
  font-size:clamp(22px,3.6vh,32px);
  line-height:1;
  font-weight:bold;
  color:white;
  background:#ff8a3d;
}
#modeBtn{background:#d44}
#clearBox{
  display:none;
  position:fixed;
  inset:0;
  z-index:10;
  background:rgba(255,244,199,.94);
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
#clearText{
  font-size:64px;
  font-weight:bold;
  color:#ff6b00;
  margin-bottom:18px;
}
</style>
</head>

<body>
<div id="wrap">
  <div id="top">
    <div id="remain">のこり9組</div>
    <div id="message">同じカードを見つけよう！</div>
  </div>

  <div id="game" class="normal"></div>

  <div id="buttons">
    <button id="restartBtn" type="button">もう一回</button>
    <button id="modeBtn" type="button">🔥本気</button>
  </div>
</div>

<div id="clearBox">
  <div id="clearText">クリア！</div>
  <button id="clearRestartBtn" type="button">もう一回</button>
</div>

<script>
(function(){
  "use strict";

  const backImage = "card-01.png";

  const normalImages = [
    "card-02.png","card-03.png","card-04.png",
    "card-05.png","card-06.png","card-07.png",
    "card-08.png","card-09.png","card-10.png"
  ];

  const honkiImages = [
    ...normalImages,
    "card-11.png","card-12.png","card-13.png"
  ];

  const wrap = document.getElementById("wrap");
  const topBar = document.getElementById("top");
  const game = document.getElementById("game");
  const buttons = document.getElementById("buttons");
  const remain = document.getElementById("remain");
  const message = document.getElementById("message");
  const modeBtn = document.getElementById("modeBtn");
  const restartBtn = document.getElementById("restartBtn");
  const clearBox = document.getElementById("clearBox");
  const clearRestartBtn = document.getElementById("clearRestartBtn");

  let currentMode = "normal";
  let currentImages = normalImages;
  let firstCard = null;
  let secondCard = null;
  let locked = false;
  let clearCount = 0;
  let lastFlipTime = 0;

  function playFile(src, delay){
    setTimeout(function(){
      try{
        const audio = new Audio(src);
        audio.play().catch(function(){});
      }catch(e){}
    }, delay || 0);
  }

  function playFlip(){
    const now = Date.now();

    // 多重タップやiPadの変な連打音を防止
    if(now - lastFlipTime < 120) return;

    lastFlipTime = now;
    playFile("meku.mp3", 0);
  }

  function playCorrect(){
    // めくる音と重ならないように少し遅らせる
    playFile("sei.mp3", 430);
  }

  function fitCards(){
    const cols = currentMode === "honki" ? 8 : 6;
    const rows = 3;
    const gap = 4;

    const w = window.innerWidth || wrap.clientWidth;
    const h = window.innerHeight || wrap.clientHeight;

    const usableW = w - 18;
    const usableH = h - topBar.offsetHeight - buttons.offsetHeight - 20;

    let cardH = ((usableH - gap * (rows - 1)) / rows) * 0.90;
    let cardW = cardH * 2 / 3;

    const maxW = (usableW - gap * (cols - 1)) / cols;

    if(cardW > maxW){
      cardW = maxW;
      cardH = cardW * 3 / 2;
    }

    const maxH = ((usableH - gap * (rows - 1)) / rows) * 0.92;
    if(cardH > maxH){
      cardH = maxH;
      cardW = cardH * 2 / 3;
    }

    document.documentElement.style.setProperty("--cardW", Math.max(30, Math.floor(cardW)) + "px");
    document.documentElement.style.setProperty("--cardH", Math.max(45, Math.floor(cardH)) + "px");
    document.documentElement.style.setProperty("--gap", gap + "px");
  }

  function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = array[i];
      array[i] = array[j];
      array[j] = tmp;
    }
    return array;
  }

  function updateInfo(){
    remain.textContent = "のこり" + (currentImages.length - clearCount) + "組";
  }

  function start(mode){
    currentMode = mode || "normal";
    currentImages = currentMode === "honki" ? honkiImages : normalImages;

    clearBox.style.display = "none";
    game.className = currentMode;
    game.innerHTML = "";

    firstCard = null;
    secondCard = null;
    locked = false;
    clearCount = 0;
    lastFlipTime = 0;

    modeBtn.textContent = currentMode === "honki" ? "😊通常" : "🔥本気";
    message.textContent = currentMode === "honki" ? "本気モード！" : "同じカードを見つけよう！";
    updateInfo();

    const deck = shuffle([...currentImages, ...currentImages]);

    deck.forEach(function(img){
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.img = img;

      card.innerHTML =
        '<div class="inner">' +
          '<div class="face back"><img src="' + backImage + '" alt=""></div>' +
          '<div class="face front"><img src="' + img + '" alt=""></div>' +
        '</div>';

      card.addEventListener("click", function(){
        openCard(card);
      });

      game.appendChild(card);
    });

    requestAnimationFrame(fitCards);
    setTimeout(fitCards, 200);
  }

  function openCard(card){
    if(locked) return;
    if(card.classList.contains("open")) return;
    if(card.classList.contains("done")) return;

    playFlip();
    card.classList.add("open");

    if(!firstCard){
      firstCard = card;
      return;
    }

    secondCard = card;
    locked = true;

    if(firstCard.dataset.img === secondCard.dataset.img){
      playCorrect();

      firstCard.classList.add("done");
      secondCard.classList.add("done");

      clearCount++;
      firstCard = null;
      secondCard = null;
      locked = false;

      message.textContent = "あたり！";
      updateInfo();

      if(clearCount === currentImages.length){
        setTimeout(function(){
          clearBox.style.display = "flex";
        }, 350);
      }
    }else{
      message.textContent = "ちがうよ！";

      setTimeout(function(){
        firstCard.classList.remove("open");
        secondCard.classList.remove("open");
        firstCard = null;
        secondCard = null;
        locked = false;
        message.textContent = currentMode === "honki" ? "本気モード！" : "同じカードを見つけよう！";
      }, 700);
    }
  }

  restartBtn.addEventListener("click", function(){
    start(currentMode);
  });

  clearRestartBtn.addEventListener("click", function(){
    start(currentMode);
  });

  modeBtn.addEventListener("click", function(){
    start(currentMode === "normal" ? "honki" : "normal");
  });

  window.addEventListener("resize", fitCards);
  window.addEventListener("orientationchange", function(){
    setTimeout(fitCards, 300);
  });

  start("normal");
})();
</script>
</body>
</html>
