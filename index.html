<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>カード神経衰弱</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff4c7}
body{
  font-family:"Hiragino Maru Gothic ProN","Arial",sans-serif;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
#wrap{
  width:100vw;
  height:100dvh;
  padding:2px 6px 3px;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
}
#top{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:16px;
  font-size:clamp(24px,3.7vh,36px);
  font-weight:bold;
  line-height:1;
  margin:0;
  white-space:nowrap;
}
#message{
  min-width:300px;
  color:#e85b00;
  text-align:center;
}
#game{
  display:grid;
  justify-content:center;
  align-content:center;
  width:100%;
  flex:1;
  gap:var(--gap,5px);
  overflow:hidden;
}
#game.normal{
  grid-template-columns:repeat(6,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
#game.honki{
  grid-template-columns:repeat(8,var(--cardW));
  grid-template-rows:repeat(3,var(--cardH));
}
.card{
  width:var(--cardW);
  height:var(--cardH);
  perspective:900px;
}
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .25s;
}
.card.open .inner,.card.done .inner{transform:rotateY(180deg)}
.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
}
.front{transform:rotateY(180deg)}
.face img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
.card.done{animation:pop .2s}
@keyframes pop{50%{transform:scale(1.06)}}
#buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:1px 0 0;
  flex-shrink:0;
}
button{
  font-size:clamp(22px,3.6vh,32px);
  line-height:1;
  padding:6px 30px;
  border:0;
  border-radius:16px;
  color:white;
  background:#ff8a3d;
  font-weight:bold;
}
#modeBtn{background:#d44}
#clear{
  display:none;
  position:fixed;
  inset:0;
  background:#fff4cfe8;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10;
}
#clear div{
  font-size:64px;
  font-weight:bold;
  margin-bottom:18px;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div id="remain"></div>
    <div id="message"></div>
    
  </div>

  <div id="game"></div>

  <div id="buttons">
    <button onclick="start(currentMode)">もう一回</button>
    <button id="modeBtn" onclick="toggleMode()">🔥本気</button>
  </div>
</div>

<div id="clear">
  <div>クリア！</div>
  <button onclick="start(currentMode)">もう一回</button>
</div>

<script>
const normal=[
  "card-02.png","card-03.png","card-04.png",
  "card-05.png","card-06.png","card-07.png",
  "card-08.png","card-09.png","card-10.png"
];
const honki=[...normal,"card-11.png","card-12.png","card-13.png"];

let currentMode="normal";
let imgs=normal;
let first=null;
let second=null;
let lock=false;
let clearCount=0;
let missCount=0;

const flipPool=[new Audio("meku.mp3"),new Audio("meku.mp3"),new Audio("meku.mp3")];
const okPool=[new Audio("sei.mp3"),new Audio("sei.mp3"),new Audio("sei.mp3")];
let flipIndex=0;
let okIndex=0;
let soundReady=false;

[...flipPool,...okPool].forEach(a=>{
  a.preload="auto";
  a.load();
});

function prepareSound(){
  if(soundReady)return;
  soundReady=true;
  [...flipPool,...okPool].forEach(a=>{
    const v=a.volume;
    a.volume=0;
    a.play().then(()=>{
      a.pause();
      a.currentTime=0;
      a.volume=v;
    }).catch(()=>{a.volume=v;});
  });
}
document.addEventListener("touchstart",prepareSound,{once:true});
document.addEventListener("mousedown",prepareSound,{once:true});

function playFromPool(pool,indexName){
  const a=pool[indexName==="flip"?flipIndex:okIndex];
  if(indexName==="flip")flipIndex=(flipIndex+1)%pool.length;
  else okIndex=(okIndex+1)%pool.length;

  try{
    a.pause();
    a.currentTime=0;
    const p=a.play();
    if(p)p.catch(()=>{});
  }catch(e){}
}

function playFlip(){
  playFromPool(flipPool,"flip");
}

function playOk(){
  setTimeout(()=>playFromPool(okPool,"ok"),220);
}

function fitCards(){
  const cols=currentMode==="honki"?8:6;
  const rows=3;
  const wrap=document.getElementById("wrap");
  const top=document.getElementById("top");
  const buttons=document.getElementById("buttons");

  const gap=4;

  // 音まわり超シンプル版
// 最初に音を準備再生しないので「バババッ」が出にくい
function playFlip(){
  try{
    const a=new Audio("meku.mp3");
    a.play().catch(()=>{});
  }catch(e){}
}

function playOk(){
  // めくる音と重ならないように少し遅らせる
  setTimeout(()=>{
    try{
      const a=new Audio("sei.mp3");
      a.play().catch(()=>{});
    }catch(e){}
  },420);
}
