<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>りんごのけいさん</title>

<style>
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#fff7df;
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  color:#333;
}

.app{
  width:100vw;
  height:100vh;
  padding:12px 24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top-area{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.manual-area{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  flex:1;
}

.key-btn,
.enter-btn,
.clear-btn,
.random-btn{
  border:none;
  border-radius:14px;
  font-family:inherit;
  font-weight:900;
  cursor:pointer;
  color:white;
}

.key-btn{
  width:46px;
  height:46px;
  font-size:28px;
  background:#6c63ff;
  box-shadow:none;
}

.op-key{
  background:#118ab2;
}

.enter-btn{
  width:78px;
  height:46px;
  font-size:24px;
  background:#2f9e44;
  box-shadow:0 5px 0 rgba(0,0,0,0.18);
}

.clear-btn{
  width:58px;
  height:46px;
  font-size:22px;
  background:#777;
  box-shadow:0 5px 0 rgba(0,0,0,0.18);
}

.enter-btn:active,
.clear-btn:active,
.random-btn:active{
  transform:translateY(4px);
  box-shadow:0 1px 0 rgba(0,0,0,0.18);
}

.random-area{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.random-btn{
  width:130px;
  height:48px;
  border-radius:999px;
  font-size:24px;
  box-shadow:0 5px 0 rgba(0,0,0,0.18);
}

.random-add{
  background:#e63946;
}

.random-sub{
  background:#1d8fe3;
}

.problem-card{
  height:33vh;
  min-height:145px;
  max-height:235px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
  border:7px solid #ffd166;
  border-radius:30px;
  padding:10px 22px;
  text-align:center;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
}

.problem-text{
  font-size:clamp(28px,4.2vw,56px);
  font-weight:850;
  line-height:1.28;
}

.apple-red{ color:#e63946; white-space:nowrap; }
.apple-blue{ color:#1d8fe3; white-space:nowrap; }

.strong-word{
  font-weight:1000;
  color:#000;
  font-size:1.2em;
  text-shadow:
    1px 0 #000,
    0 1px #000,
    -1px 0 #000,
    0 -1px #000;
}

.make-formula-btn{
  margin:0 auto;
  width:65%;
  min-height:72px;
  border:none;
  border-radius:28px;
  background:#2f9e44;
  color:white;
  font-family:inherit;
  font-weight:900;
  font-size:clamp(30px,4vw,52px);
  box-shadow:0 7px 0 rgba(0,0,0,0.18);
}

.make-formula-btn:active{
  transform:translateY(5px);
  box-shadow:0 2px 0 rgba(0,0,0,0.18);
}

.formula-row{
  display:none;
  grid-template-columns:1.35fr 0.62fr 1.35fr 0.42fr 0.85fr;
  gap:12px;
  align-items:center;
  width:100%;
}

.question-btn{
  min-height:105px;
  width:100%;
  border:none;
  border-radius:30px;
  font-family:inherit;
  font-weight:900;
  font-size:clamp(38px,6.2vw,82px);
  color:white;
  line-height:1.05;
  padding:8px 10px;
  box-shadow:0 7px 0 rgba(0,0,0,0.18);
}

.question-btn:active{
  transform:translateY(5px);
  box-shadow:0 2px 0 rgba(0,0,0,0.18);
}

.apple-btn-red{ background:#ff5a5f; }
.apple-btn-blue{ background:#2d9cdb; }
.operator-btn{ background:#6c63ff; }
.answer-btn{ background:#f72585; }

.revealed{
  background:white !important;
  color:#333;
  border:7px solid #7bd389;
  box-shadow:inset 0 -7px 0 rgba(0,0,0,0.08), 0 7px 0 rgba(0,0,0,0.18);
}

.eq-mark{
  min-height:105px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(54px,7vw,92px);
  font-weight:900;
}

@media(max-height:650px){
  .app{ padding:8px 18px; gap:7px; }
  .key-btn{ width:39px; height:39px; font-size:23px; }
  .enter-btn{ width:68px; height:39px; font-size:20px; }
  .clear-btn{ width:50px; height:39px; font-size:18px; }
  .random-btn{ width:115px; height:40px; font-size:20px; }
  .problem-card{ height:31vh; min-height:120px; padding:8px 16px; border-width:6px; }
  .problem-text{ font-size:clamp(25px,3.8vw,46px); }
  .question-btn,.eq-mark{ min-height:82px; }
  .make-formula-btn{ min-height:58px; }
}
</style>
</head>

<body>
<main class="app">

  <div class="top-area">

    <div class="manual-area">
      <button class="key-btn" onclick="pushInput('1')">1</button>
      <button class="key-btn" onclick="pushInput('2')">2</button>
      <button class="key-btn" onclick="pushInput('3')">3</button>
      <button class="key-btn" onclick="pushInput('4')">4</button>
      <button class="key-btn" onclick="pushInput('5')">5</button>
      <button class="key-btn" onclick="pushInput('6')">6</button>
      <button class="key-btn" onclick="pushInput('7')">7</button>
      <button class="key-btn" onclick="pushInput('8')">8</button>
      <button class="key-btn" onclick="pushInput('9')">9</button>
      <button class="key-btn" onclick="pushInput('0')">0</button>

      <button class="key-btn op-key" onclick="pushOperator('+')">+</button>
      <button class="key-btn op-key" onclick="pushOperator('-')">−</button>

      <button class="enter-btn" onclick="makeManualProblem()">決定</button>
      <button class="clear-btn" onclick="clearInput()">消す</button>
    </div>

    <div class="random-area">
      <button class="random-btn random-add" onclick="makeProblem('add')">ランダム</button>
      <button class="random-btn random-sub" onclick="makeProblem('sub')">ランダム</button>
    </div>

  </div>

  <section class="problem-card">
    <div id="problemText" class="problem-text">
      ランダムボタンか<br>数字ボタンをおしてね！
    </div>
  </section>

  <button id="makeFormulaBtn" class="make-formula-btn" onclick="showFormula()">
    しきを つくってみよう
  </button>

  <section id="formulaRow" class="formula-row">
    <button id="leftNum" class="question-btn apple-btn-red" onclick="showLeft()">🍎<br>りんご</button>
    <button id="opBtn" class="question-btn operator-btn" onclick="showOperator()">？</button>
    <button id="rightNum" class="question-btn apple-btn-blue" onclick="showRight()">🍏<br>りんご</button>
    <div class="eq-mark">=</div>
    <button id="ansBtn" class="question-btn answer-btn" onclick="showAnswer()">？</button>
  </section>

</main>

<script>
let current=null;
let manualValue="";

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function colorSpan(color,text){
  const cls=color==="red" ? "apple-red" : "apple-blue";
  return `<span class="${cls}">${text}</span>`;
}

function resetButton(id,text,className){
  const btn=document.getElementById(id);
  btn.innerHTML=text;
  btn.className=className;
}

function revealButton(id,value){
  const btn=document.getElementById(id);
  btn.textContent=value;
  btn.classList.add("revealed");
}

function prepareFormula(){
  document.getElementById("formulaRow").style.display="none";
  document.getElementById("makeFormulaBtn").style.display="block";
  resetButton("opBtn","？","question-btn operator-btn");
  resetButton("ansBtn","？","question-btn answer-btn");
}

function setAddProblem(left,right){
  current={
    type:"add",
    left:left,
    right:right,
    leftApple:"🍎",
    rightApple:"🍏",
    operator:"+",
    answer:left+right
  };

  document.getElementById("problemText").innerHTML=
    `${colorSpan("red",`赤りんご ${left}こ`)}、${colorSpan("blue",`青りんご ${right}こ`)} ありました。<br>
    <span class="strong-word">あわせて</span> なんこですか？`;

  resetButton("leftNum","🍎<br>りんご","question-btn apple-btn-red");
  resetButton("rightNum","🍏<br>りんご","question-btn apple-btn-blue");
  prepareFormula();
}

function setSubProblem(left,right,color){
  if(right >= left){
    alert("ひきざんは、左の数を右の数より大きくしてね。");
    return;
  }

  const appleName=color==="red" ? "赤りんご" : "青りんご";
  const appleIcon=color==="red" ? "🍎" : "🍏";
  const appleClass=color==="red" ? "apple-btn-red" : "apple-btn-blue";

  current={
    type:"sub",
    left:left,
    right:right,
    leftApple:appleIcon,
    rightApple:appleIcon,
    appleClass:appleClass,
    operator:"−",
    answer:left-right
  };

  document.getElementById("problemText").innerHTML=
    `${colorSpan(color,`${appleName} ${left}こ`)} ありました。<br>
    ${colorSpan(color,`${appleName}を ${right}こ`)} たべたら、<br>
    <span class="strong-word">のこりは</span> なんこですか？`;

  resetButton("leftNum",`${appleIcon}<br>りんご`,`question-btn ${appleClass}`);
  resetButton("rightNum",`${appleIcon}<br>りんご`,`question-btn ${appleClass}`);
  prepareFormula();
}

function makeProblem(mode){
  clearInput();

  if(mode==="add"){
    setAddProblem(rand(1,9), rand(1,9));
  }

  if(mode==="sub"){
    const start=rand(3,12);
    const eat=rand(1,start-1);
    const color=Math.random()<0.5 ? "red" : "blue";
    setSubProblem(start,eat,color);
  }
}

function pushInput(value){
  const parts=manualValue.split(/[+-]/);
  const currentPart=parts[parts.length-1];

  if(currentPart.length >= 3) return;
  manualValue += value;
}

function pushOperator(op){
  if(manualValue==="") return;
  if(manualValue.includes("+") || manualValue.includes("-")) return;
  manualValue += op;
}

function clearInput(){
  manualValue="";
}

function makeManualProblem(){
  const match=manualValue.match(/^(\d{1,3})([+-])(\d{1,3})$/);

  if(!match){
    alert("数字、＋か−、数字の順におしてね。例：12+3");
    return;
  }

  const left=parseInt(match[1],10);
  const op=match[2];
  const right=parseInt(match[3],10);

  if(op==="+"){
    setAddProblem(left,right);
  }else{
    const color=Math.random()<0.5 ? "red" : "blue";
    setSubProblem(left,right,color);
  }

  clearInput();
}

function showFormula(){
  if(!current) return;
  document.getElementById("formulaRow").style.display="grid";
}

function showLeft(){
  if(!current) return;
  revealButton("leftNum",current.left);
}

function showRight(){
  if(!current) return;
  revealButton("rightNum",current.right);
}

function showOperator(){
  if(!current) return;
  revealButton("opBtn",current.operator);
}

function showAnswer(){
  if(!current) return;
  revealButton("ansBtn",current.answer);
}
</script>

</body>
</html>
